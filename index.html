<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>ZigZag Neon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050010;overflow:hidden;touch-action:none;user-select:none}
canvas{display:block}
.hud{position:fixed;top:24px;left:50%;transform:translateX(-50%);display:flex;gap:44px;z-index:10;pointer-events:none}
.hv{text-align:center;font-family:'Segoe UI',sans-serif}
.hv-n{font-size:44px;font-weight:900;line-height:1;background:linear-gradient(135deg,#00f5ff,#bf00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hv-l{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:3px;text-transform:uppercase}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;transition:opacity .5s;z-index:20}
.scr.off{opacity:0;pointer-events:none}
.logo{font-size:80px;font-weight:900;letter-spacing:-3px;background:linear-gradient(135deg,#00f5ff,#bf00ff,#ff00a8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 40px rgba(0,245,255,.5))}
.hint{color:rgba(255,255,255,.45);font-size:15px;letter-spacing:5px;margin-top:12px;animation:bl 1.5s infinite}
@keyframes bl{0%,100%{opacity:.4}50%{opacity:1}}
.mbest{color:rgba(255,255,255,.25);font-size:13px;letter-spacing:2px;margin-top:40px}
.mbest b{color:#00f5ff;font-size:22px}
.got{color:white;font-size:42px;font-weight:900;margin-bottom:14px}
.gol{color:rgba(255,255,255,.3);font-size:11px;letter-spacing:4px;text-transform:uppercase}
.gos{font-size:100px;font-weight:900;line-height:1;background:linear-gradient(135deg,#00f5ff,#bf00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gonb{color:#FFD700;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-top:8px;animation:pg 1s infinite}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.3}}
.btn{margin-top:46px;padding:18px 72px;border-radius:100px;border:none;cursor:pointer;background:linear-gradient(135deg,#00f5ff,#bf00ff);color:white;font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;box-shadow:0 0 50px rgba(0,245,255,.4),0 0 100px rgba(191,0,255,.3);transition:transform .2s}
.btn:hover{transform:scale(1.06)}
.ft{position:fixed;font-family:'Segoe UI',sans-serif;font-size:23px;font-weight:900;color:#FFD700;pointer-events:none;z-index:30;text-shadow:0 0 12px rgba(255,215,0,.9);animation:ftu .9s ease forwards}
@keyframes ftu{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.4);opacity:0}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud" style="display:none">
  <div class="hv"><div class="hv-n" id="hS">0</div><div class="hv-l">Score</div></div>
  <div class="hv"><div class="hv-n" id="hG">💎 0</div><div class="hv-l">Gems</div></div>
</div>
<div class="scr" id="sM">
  <div class="logo">ZIGZAG</div>
  <div class="hint">TAP TO START</div>
  <div class="mbest">BEST: <b id="mB">0</b></div>
</div>
<div class="scr off" id="sO">
  <div class="got">GAME OVER</div>
  <div class="gol">Score</div>
  <div class="gos" id="gS">0</div>
  <div class="gonb" id="gN" style="display:none">⭐ NEW BEST ⭐</div>
  <button class="btn" id="bP">PLAY AGAIN</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function rsz(){W=C.width=innerWidth;H=C.height=innerHeight;}
rsz();addEventListener('resize',rsz);

const T=54,BR=13,V0=3.5,GP=.22;
let phase='menu',score=0,gems=0,spd=V0;
let best=+localStorage.getItem('zz_best')||0;
let skX=0,skY=0,parts=[];
let path=[],pDir=1,pCol=0,pRow=0,tid=0;
let bCol=0,bRow=0,bDir=1,prevId=-1,tileCnt=0;
let cX=0,cY=0;

const ws=(c,r)=>({x:c*T-cX+W/2,y:r*T-cY+H*.38});

function gen(){
  const n=5+(Math.random()*9|0);
  for(let i=0;i<n;i++){
    pCol+=pDir;pRow++;
    path.push({c:pCol,r:pRow,g:Math.random()<GP,gr:Math.random()*6.28,gd:false,a:1,fl:false,fy:0,id:tid++});
  }
  pDir*=-1;
}

function startGame(){
  score=0;gems=0;spd=V0;tileCnt=0;prevId=-1;
  path=[];parts=[];skX=0;skY=0;
  pDir=1;pCol=0;pRow=0;tid=0;
  path.push({c:0,r:0,g:false,gr:0,gd:false,a:1,fl:false,fy:0,id:tid++});
  for(let i=0;i<6;i++)gen();
  bCol=0;bRow=0;bDir=1;cX=0;cY=0;
  phase='play';
  document.getElementById('hud').style.display='flex';
  document.getElementById('sM').classList.add('off');
  document.getElementById('sO').classList.add('off');
  document.getElementById('hS').textContent='0';
  document.getElementById('hG').textContent='💎 0';
}

function die(){
  phase='dead';skX=15;skY=15;
  const p=ws(bCol,bRow);
  for(let i=0;i<30;i++){
    const a=(Math.PI*2/30)*i,s=3+Math.random()*5;
    parts.push({x:p.x,y:p.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:3+Math.random()*4,life:1,c:'#00f5ff',d:.022+Math.random()*.02});
  }
  if(score>best){best=score;localStorage.setItem('zz_best',best);document.getElementById('gN').style.display='';}
  else document.getElementById('gN').style.display='none';
  document.getElementById('gS').textContent=score;
  document.getElementById('mB').textContent=best;
  setTimeout(()=>{document.getElementById('sO').classList.remove('off');document.getElementById('hud').style.display='none';},800);
}

function tap(){if(phase==='menu')startGame();else if(phase==='play')bDir*=-1;}
C.addEventListener('click',tap);
C.addEventListener('touchstart',e=>{e.preventDefault();tap();},{passive:false});
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();tap();}});
document.getElementById('bP').addEventListener('click',e=>{e.stopPropagation();startGame();});

function burst(x,y,col){
  for(let i=0;i<22;i++){
    const a=(Math.PI*2/22)*i,s=2+Math.random()*4;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:2+Math.random()*3,life:1,c:col,d:.03+Math.random()*.03});
  }
  skX=7;skY=7;
}

function floater(t,x,y){
  const el=document.createElement('div');
  el.className='ft';el.textContent=t;
  el.style.left=(x-18)+'px';el.style.top=(y-20)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),900);
}

function drawBg(){
  X.fillStyle='#050010';X.fillRect(0,0,W,H);
  X.strokeStyle='rgba(60,0,100,.25)';X.lineWidth=.5;
  const gs=58,ox=((-cX%gs)+gs)%gs,oy=((-cY%gs)+gs)%gs;
  for(let x=ox;x<W;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(let y=oy;y<H;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
  X.fillStyle='rgba(255,255,255,.7)';
  for(let i=0;i<65;i++){
    const sx=((i*137+(cX*.06|0))%W+W)%W;
    const sy=((i*89+(cY*.06|0))%H+H)%H;
    X.fillRect(sx,sy,1.5,1.5);
  }
}

function drawTile(t){
  const p=ws(t.c,t.r),ty=p.y+(t.fl?t.fy:0);
  if(t.a<=0)return;
  const hw=T*.46;
  X.save();X.globalAlpha=t.a;
  X.fillStyle='rgba(40,0,80,.7)';
  X.beginPath();X.moveTo(p.x,ty-hw+8);X.lineTo(p.x+hw,ty+8);X.lineTo(p.x,ty+hw+8);X.lineTo(p.x-hw,ty+8);X.closePath();X.fill();
  X.shadowBlur=22;X.shadowColor='#6600ff';X.fillStyle='#180060';
  X.beginPath();X.moveTo(p.x,ty-hw);X.lineTo(p.x+hw,ty);X.lineTo(p.x,ty+hw);X.lineTo(p.x-hw,ty);X.closePath();X.fill();
  X.strokeStyle='rgba(140,0,255,.9)';X.lineWidth=1.8;
  X.beginPath();X.moveTo(p.x,ty-hw);X.lineTo(p.x+hw,ty);X.stroke();
  X.beginPath();X.moveTo(p.x,ty-hw);X.lineTo(p.x-hw,ty);X.stroke();
  if(t.g&&!t.gd){
    t.gr+=.055;
    X.save();X.translate(p.x,ty-17);X.rotate(t.gr);
    X.shadowBlur=22;X.shadowColor='#ff00a8';X.fillStyle='#ff00a8';
    X.beginPath();X.moveTo(0,-9);X.lineTo(5.4,0);X.lineTo(0,9);X.lineTo(-5.4,0);X.closePath();X.fill();
    X.strokeStyle='rgba(255,190,255,.8)';X.lineWidth=1;X.stroke();
    X.restore();
  }
  X.restore();
}

function drawBall(){
  if(phase==='dead')return;
  const p=ws(bCol,bRow);
  X.save();
  X.shadowBlur=35;X.shadowColor='#00f5ff';
  X.fillStyle='rgba(0,245,255,.1)';
  X.beginPath();X.arc(p.x,p.y,BR*2.7,0,Math.PI*2);X.fill();
  const g=X.createRadialGradient(p.x-5,p.y-5,2,p.x,p.y,BR);
  g.addColorStop(0,'#fff');g.addColorStop(.4,'#00f5ff');g.addColorStop(1,'#003fff');
  X.fillStyle=g;X.shadowBlur=28;
  X.beginPath();X.arc(p.x,p.y,BR,0,Math.PI*2);X.fill();
  X.restore();
}

function drawParts(){
  parts.forEach(p=>{
    X.save();X.globalAlpha=p.life;X.fillStyle=p.c;X.shadowBlur=10;X.shadowColor=p.c;
    X.beginPath();X.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);X.fill();X.restore();
  });
}

let lt=0;
function upd(dt){
  if(phase!=='play')return;
  const step=spd*(dt/1000);
  bCol+=bDir*step;bRow+=step;
  const near=path.find(t=>!t.fl&&Math.abs(t.c-bCol)<.52&&Math.abs(t.r-bRow)<.52);
  if(!near){die();return;}
  if(near.id!==prevId){prevId=near.id;tileCnt++;score=tileCnt;document.getElementById('hS').textContent=score;}
  spd=Math.min(V0+tileCnt*.012,8);
  if(near.g&&!near.gd){
    near.gd=true;gems++;
    document.getElementById('hG').textContent='💎 '+gems;
    const p=ws(near.c,near.r);
    burst(p.x,p.y-16,'#ff00a8');
    floater('+10',p.x,p.y);
  }
  cX+=(bCol*T-cX)*.13;cY+=(bRow*T-cY)*.13;
  path.forEach(t=>{
    if(!t.fl&&t.r<bRow-4)t.fl=true;
    if(t.fl){t.fy+=5;t.a=Math.max(0,t.a-.045);}
  });
  if(pRow-bRow<40)gen();
  if(path.length>360)path.splice(0,120);
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.13;p.life-=p.d;});
  parts=parts.filter(p=>p.life>0);
  skX*=.78;skY*=.78;
}

function loop(ts){
  const dt=Math.min(ts-lt,32);lt=ts;
  upd(dt);
  X.save();
  if(skX>.2)X.translate((Math.random()-.5)*skX*2,(Math.random()-.5)*skY*2);
  drawBg();path.forEach(drawTile);drawBall();drawParts();
  X.restore();
  requestAnimationFrame(loop);
}
document.getElementById('mB').textContent=best;
requestAnimationFrame(loop);
</script>
</body>
</html>
